name: Backend Tests

on:
  pull_request:
    paths:
      - "backend/**"
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pandahub_test
          POSTGRES_PASSWORD: pandahub_test
          POSTGRES_DB: pandahub_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pandahub_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps (libgit2 for pygit2)
        run: sudo apt-get update && sudo apt-get install -y libgit2-dev

      - name: Install Python deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://pandahub_test:pandahub_test@localhost:5432/pandahub_test
        run: alembic upgrade head

      - name: Run lint (ruff)
        working-directory: backend
        run: ruff check app

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://pandahub_test:pandahub_test@localhost:5432/pandahub_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci_test_secret_key_not_for_production
        run: pytest -v --cov=app --cov-report=term-missing
