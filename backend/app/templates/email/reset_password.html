<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, Arial, sans-serif; background:#f6f8fa; padding:32px;">
  <div style="max-width:480px; margin:0 auto; background:#ffffff; border-radius:8px; padding:32px; border:1px solid #d0d7de;">
    <h2 style="color:#0d1117; margin-top:0;">🐼 Reset your PandaHub password</h2>
    <p style="color:#24292f; font-size:15px; line-height:1.5;">
      Hi {{ username }}, we received a request to reset your password.
    </p>
    <p style="text-align:center; margin:32px 0;">
      <a href="{{ reset_url }}"
         style="background:#0a6cff; color:#ffffff; padding:12px 24px; border-radius:6px; text-decoration:none; font-weight:600;">
        Reset Password
      </a>
    </p>
    <p style="color:#57606a; font-size:13px;">
      This link expires in 1 hour. If you didn't request a password reset, you can safely ignore this email --
      your password will not be changed.
    </p>
  </div>
</body>
</html>
