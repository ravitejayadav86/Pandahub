<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, Arial, sans-serif; background:#f6f8fa; padding:32px;">
  <div style="max-width:480px; margin:0 auto; background:#ffffff; border-radius:8px; padding:32px; border:1px solid #d0d7de;">
    <h2 style="color:#0d1117; margin-top:0;">🐼 Welcome to PandaHub</h2>
    <p style="color:#24292f; font-size:15px; line-height:1.5;">
      Hi {{ username }}, confirm your email address to activate your account.
    </p>
    <p style="text-align:center; margin:32px 0;">
      <a href="{{ verification_url }}"
         style="background:#2f9e44; color:#ffffff; padding:12px 24px; border-radius:6px; text-decoration:none; font-weight:600;">
        Verify Email Address
      </a>
    </p>
    <p style="color:#57606a; font-size:13px;">
      This link expires in 24 hours. If you didn't create a PandaHub account, you can safely ignore this email.
    </p>
  </div>
</body>
</html>
