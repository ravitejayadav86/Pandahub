version: "3.9"

# ---------------------------------------------------------------------------
# PandaHub — Local / Production Orchestration
#
# Design notes:
# - `postgres`, `redis`, `minio` are stateful and get named volumes.
# - `backend` (FastAPI) and `worker` (Celery) share the SAME image/codebase
#   but run different entrypoints — this avoids duplicating dependencies
#   while keeping API latency isolated from slow background jobs.
# - `git-storage` is a named volume mounted into both backend and worker,
#   since both need to read/write bare repositories (API for browsing,
#   worker for clone/push processing).
# - Healthchecks gate `depends_on` so the backend never boots against a
#   Postgres/Redis that isn't ready yet (avoids startup race conditions).
# ---------------------------------------------------------------------------

services:

  postgres:
    image: postgres:16-alpine
    container_name: pandahub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pandahub_net

  redis:
    image: redis:7-alpine
    container_name: pandahub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pandahub_net

  minio:
    image: minio/minio:latest
    container_name: pandahub_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pandahub_net

  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/backend.Dockerfile
    container_name: pandahub_backend
    restart: unless-stopped
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - git_storage:/data/repositories
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - pandahub_net

  worker:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/worker.Dockerfile
    container_name: pandahub_worker
    restart: unless-stopped
    env_file: .env
    command: celery -A app.worker.celery_app worker --loglevel=info -Q git_ops,ai_ops,email
    volumes:
      - ./backend:/app
      - git_storage:/data/repositories
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pandahub_net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/frontend.Dockerfile
    container_name: pandahub_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pandahub_net

  nginx:
    image: nginx:1.27-alpine
    container_name: pandahub_nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - pandahub_net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  git_storage:

networks:
  pandahub_net:
    driver: bridge
