worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 500M;   # large git pushes / LFS uploads

    # ---- Rate limiting zones (defense in depth, alongside app-layer limits) ----
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=git_limit:10m rate=30r/m;

    upstream backend_upstream {
        server backend:8000;
    }

    upstream frontend_upstream {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # ---- Git Smart HTTP protocol ----
        # Routed BEFORE the general API location so push/pull/fetch bypass
        # JSON-oriented middleware and stream directly to the git engine.
        location ~ ^/git/ {
            limit_req zone=git_limit burst=10 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_request_buffering off;   # stream large pushes instead of buffering to disk
            proxy_read_timeout 3600s;      # long-lived clone/push operations
        }

        # ---- WebSocket upgrade (realtime notifications) ----
        location /ws/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # ---- REST API ----
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- FastAPI auto-generated docs ----
        location /docs {
            proxy_pass http://backend_upstream;
        }

        # ---- Everything else -> Next.js frontend ----
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Security headers (defense in depth) ----
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
