services:
  # ─── Backend API (FastAPI) ──────────────────────────────────────────────────
  - type: web
    name: pandahub-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pandahub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pandahub-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false          # Set to your Render frontend URL after first deploy
      - key: BACKEND_URL
        sync: false          # Set to your Render backend URL after first deploy
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # Comma-separated: https://pandahub-frontend.onrender.com
      - key: B2_KEY_ID
        sync: false          # Backblaze B2 Key ID
      - key: B2_APPLICATION_KEY
        sync: false          # Backblaze B2 Application Key
      - key: B2_ENDPOINT
        sync: false          # e.g. s3.us-east-005.backblazeb2.com
      - key: B2_BUCKET_NAME
        sync: false          # e.g. Pandahub
      - key: CELERY_BROKER_URL
        fromService:
          name: pandahub-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: pandahub-redis
          type: redis
          property: connectionString
      - key: PORT
        value: "8000"

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: pandahub-worker
    runtime: docker
    dockerfilePath: ./backend/worker.Dockerfile
    dockerContext: ./backend
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pandahub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pandahub-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_ENDPOINT
        sync: false
      - key: B2_BUCKET_NAME
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CELERY_BROKER_URL
        fromService:
          name: pandahub-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: pandahub-redis
          type: redis
          property: connectionString

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  - type: web
    name: pandahub-frontend
    runtime: docker
    dockerfilePath: ./infrastructure/docker/frontend.Dockerfile
    dockerContext: ./frontend
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false          # Set to https://pandahub-backend.onrender.com

databases:
  # ─── Render-managed PostgreSQL ──────────────────────────────────────────────
  - name: pandahub-db
    plan: starter            # Free tier: 1 GB, shared compute
    databaseName: pandahub
    user: pandahub

  # ─── Render-managed Redis ───────────────────────────────────────────────────
  - name: pandahub-redis
    type: redis
    plan: starter            # Free tier: 25 MB
    ipAllowList: []          # Only services within this Render account can connect
